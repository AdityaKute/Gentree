# PostgreSQL configuration for explicit profile activation
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/gentree}
spring.datasource.username=${DB_USER:gentree_user}
spring.datasource.password=${DB_PASS:gentree_password}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
