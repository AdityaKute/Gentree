# Database Configuration
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/gentree}
spring.datasource.username=${DB_USER:gentree_user}
spring.datasource.password=${DB_PASS:gentree_password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Server Configuration
server.port=${SERVER_PORT:8080}

# Frontend origin for CORS
frontend.origin=${FRONTEND_ORIGIN:http://localhost:5173}

# Logging
logging.level.com.gentree=DEBUG