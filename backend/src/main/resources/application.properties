# Default database configuration for development
spring.datasource.url=jdbc:h2:mem:gentree;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# H2 console for local debugging
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Server Configuration
server.port=${SERVER_PORT:8080}

# Frontend origin for CORS
frontend.origin=${FRONTEND_ORIGIN:http://localhost:5173}

# Logging
logging.level.com.gentree=DEBUG